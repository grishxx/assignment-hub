<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Assignment Hub</title>

  <!-- Tailwind CSS (CDN for demo) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React + ReactDOM (UMD) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- SheetJS for Excel export -->
  <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.259.0/dist/lucide.min.js"></script>

  <style>
    :root {
      --bg: #ffffff; --card:#ffffff; --text:#0f172a; --muted:#475569;
      --primary:#2563eb; --accent:#ef4444; --accent2:#f59e0b; --success:#16a34a; --warning:#f59e0b; --ring: rgba(37,99,235,.4);
      --pop:#7c3aed; /* violet-600 */
    }
    [data-theme="dark"] {
      --bg:#0b1220; --card:#071025; --text:#e6eef8; --muted:#a8c0e6; --ring: rgba(148,163,184,.35);
    }
    body{ background:var(--bg); color:var(--text); transition:background-color .3s ease,color .3s ease; }
    .card{ background:var(--card); border:1px solid rgba(148,163,184,.25); }
    .muted{ color:var(--muted); }
    .btn{ transition:transform .15s ease, box-shadow .15s ease, background-color .2s ease; }
    .btn:hover{ transform:translateY(-1px); }
    .ring-focus:focus{ outline:none; box-shadow:0 0 0 4px var(--ring); }
    .pill{ background:rgba(148,163,184,.12); }

    /* Splash + visible animations */
    @keyframes fadeSlideIn { from { opacity:0; transform: translateY(18px); } to { opacity:1; transform: translateY(0); } }
    .animate-fadeSlideIn { animation: fadeSlideIn .55s ease both; }
    @keyframes pop { 0%{ transform:scale(1); } 50%{ transform:scale(1.045); } 100%{ transform:scale(1); } }
    .animate-pop { animation: pop .6s ease both; }
    @keyframes glowPulse { 0%,100%{ box-shadow: 0 0 0 0 rgba(124,58,237,.35);} 50%{ box-shadow: 0 0 0 10px rgba(124,58,237,.0);} }
    .glow { animation: glowPulse 1.8s ease-in-out infinite; }

    .stagger > * { opacity: 0; transform: translateY(18px); }

    /* Splash screen */
    .splash-bg { background: radial-gradient(1200px 600px at 50% -10%, rgba(99,102,241,.25), transparent 60%), var(--bg); }
    @keyframes splashFade { from { opacity: 1; } to { opacity: 0; } }
    .splash-hide { animation: splashFade .6s ease forwards; }
    @keyframes logoIn { from { transform: translateY(10px) scale(.94); opacity:0; } to { transform: translateY(0) scale(1); opacity:1; } }
    .logo-anim { animation: logoIn .6s ease both; }
  </style>
</head>
<body class="min-h-screen antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    /* ---------- Utilities ---------- */
    const Icon = ({ name, className = '', strokeWidth = 2 }) => (
      <i data-lucide={name} className={className} data-stroke-width={strokeWidth}></i>
    );

    const Toggle = ({ theme, setTheme }) => (
      <button
        onClick={() => setTheme(t => t === 'light' ? 'dark' : 'light')}
        className="relative flex items-center gap-3 p-2 rounded-full pill border btn"
        title="Toggle theme" aria-label="Toggle theme"
        style={{ paddingRight: '18px', paddingLeft: '18px' }}
      >
        <span className="absolute top-1 bottom-1 w-10 rounded-full transition-all" style={{ background:'white', opacity:.12, left: theme==='light' ? '4px' : 'calc(100% - 44px)' }} />
        <span className={"text-sm font-medium " + (theme==='light' ? '' : 'opacity-50')}>☀️</span>
        <span className={"text-sm font-medium " + (theme==='dark' ? '' : 'opacity-50')}>🌙</span>
      </button>
    );

    const Section = ({ children, className='' }) => (
      <section className={"card rounded-2xl p-8 shadow-sm animate-fadeSlideIn " + className}>{children}</section>
    );

    /* ---------- Storage Helpers ---------- */
    const LS_KEYS = {
      students: 'ah_students_be',
      teachers: 'ah_teachers_be',
      submissions: 'ah_submissions_be_v1',
      theme: 'ah_theme'
    };

    const loadLS = (key, fallback) => {
      try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
    };
    const saveLS = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };

    /* ---------- App ---------- */
    function App() {
      const [theme, setTheme] = useState(() => localStorage.getItem(LS_KEYS.theme) || 'light');
      const [mode, setMode] = useState('splash'); // splash -> landing | viewGrades | teacherLogin | studentLogin | student | teacher | studentSignup | teacherSignup
      const [currentTeacher, setCurrentTeacher] = useState(null);
      const [currentStudent, setCurrentStudent] = useState(null);

      // Seed BE teachers/students (title hides BE label, data remains BE)
      const seedTeachers = useMemo(() => ([
        { id:'BE-T001', name:'Dr. Arjun Rao', email:'arjun.rao@univ.edu', password:'pass123', departments:['CSE','EEE'], subjects:['Data Structures','Signals'] },
        { id:'BE-T002', name:'Dr. Kavya Iyer', email:'kavya.iyer@univ.edu', password:'pass123', departments:['ECE'], subjects:['Digital Design','VLSI'] },
        { id:'BE-T003', name:'Prof. Sanjay Patel', email:'sanjay.patel@univ.edu', password:'pass123', departments:['MECH'], subjects:['Thermodynamics','Fluid Mechanics'] },
        { id:'BE-T004', name:'Dr. Nisha Reddy', email:'nisha.reddy@univ.edu', password:'pass123', departments:['CIVIL'], subjects:['Structural Analysis','Concrete Technology'] }
      ]), []);

      const seedStudents = useMemo(() => ([
        { id:'BE-CSE-001', name:'Aarav Sharma', email:'aarav.cse@univ.edu', password:'pass123', year:'BE', branch:'CSE', section:'A' },
        { id:'BE-CSE-002', name:'Isha Verma', email:'isha.cse@univ.edu', password:'pass123', year:'BE', branch:'CSE', section:'A' },
        { id:'BE-ECE-001', name:'Rohan Gupta', email:'rohan.ece@univ.edu', password:'pass123', year:'BE', branch:'ECE', section:'B' },
        { id:'BE-MECH-001', name:'Meera Nair', email:'meera.mech@univ.edu', password:'pass123', year:'BE', branch:'MECH', section:'A' },
        { id:'BE-CIVIL-001', name:'Devika Rao', email:'devika.civil@univ.edu', password:'pass123', year:'BE', branch:'CIVIL', section:'B' }
      ]), []);

      const [teachers, setTeachers] = useState(() => loadLS(LS_KEYS.teachers, seedTeachers));
      const [students, setStudents] = useState(() => loadLS(LS_KEYS.students, seedStudents));

      const seedSubs = [
        { id:1, studentIds:['BE-CSE-001'], name:'Aarav Sharma', assignment:'Data Structures Lab 1', file:'ds1.pdf', fileData:null, date:'2025-10-01', grade:85, maxGrade:100, teacherId:'BE-T001', subject:'Data Structures', type:'individual', teamMembers:['BE-CSE-001'] },
        { id:2, studentIds:['BE-CSE-002'], name:'Isha Verma', assignment:'Data Structures Lab 1', file:'ds1.pdf', fileData:null, date:'2025-10-01', grade:92, maxGrade:100, teacherId:'BE-T001', subject:'Data Structures', type:'individual', teamMembers:['BE-CSE-002'] },
        { id:3, studentIds:['BE-CSE-001','BE-CSE-002'], name:'Team: Aarav & Isha', assignment:'VLSI Mini Project', file:'vlsi.pdf', fileData:null, date:'2025-10-04', grade:88, maxGrade:100, teacherId:'BE-T002', subject:'VLSI', type:'team', teamMembers:['BE-CSE-001','BE-CSE-002'] }
      ];

      const [submissions, setSubmissions] = useState(() => loadLS(LS_KEYS.submissions, seedSubs));

      useEffect(() => { document.documentElement.setAttribute('data-theme', theme); localStorage.setItem(LS_KEYS.theme, theme); if (window.lucide?.createIcons) window.lucide.createIcons(); }, [theme]);
      useEffect(() => { saveLS(LS_KEYS.teachers, teachers); }, [teachers]);
      useEffect(() => { saveLS(LS_KEYS.students, students); }, [students]);
      useEffect(() => { saveLS(LS_KEYS.submissions, submissions); }, [submissions]);
      useEffect(() => { if (window.lucide?.createIcons) window.lucide.createIcons(); });

      // Splash screen timer
      useEffect(() => {
        if (mode === 'splash') {
          const t = setTimeout(() => setMode('landing'), 1500);
          return () => clearTimeout(t);
        }
      }, [mode]);

      // Stagger animation on visible groups
      useEffect(() => {
        const groups = document.querySelectorAll('.stagger');
        groups.forEach(group => {
          const items = Array.from(group.children);
          items.forEach((el, i) => {
            el.style.animationDelay = (i * 90) + 'ms';
            el.classList.add('animate-fadeSlideIn');
          });
        });
      }, [mode, currentTeacher, currentStudent, submissions.length, students.length, teachers.length]);

      /* ---------- Auth & Signup ---------- */
      const [teacherLogin, setTeacherLogin] = useState({ idOrEmail:'', password:'' });
      const [studentLogin, setStudentLogin] = useState({ idOrEmail:'', password:'' });

      const findTeacher = (idOrEmail) => teachers.find(t => t.id === idOrEmail || t.email === idOrEmail);
      const findStudent = (idOrEmail) => students.find(s => s.id === idOrEmail || s.email === idOrEmail);

      const handleTeacherLogin = () => {
        const t = findTeacher(teacherLogin.idOrEmail);
        if (t && t.password === teacherLogin.password) { setCurrentTeacher(t.id); setMode('teacher'); setTeacherLogin({ idOrEmail:'', password:'' }); }
        else alert('Invalid credentials!');
      };
      const handleStudentLogin = () => {
        const s = findStudent(studentLogin.idOrEmail);
        if (s && s.password === studentLogin.password) { setCurrentStudent(s.id); setMode('student'); setStudentLogin({ idOrEmail:'', password:'' }); }
        else alert('Invalid credentials!');
      };
      const handleLogout = () => { setCurrentTeacher(null); setCurrentStudent(null); setMode('landing'); };

      // Signups
      const [studentSignup, setStudentSignup] = useState({ id:'', email:'', name:'', password:'', branch:'CSE', section:'A' });
      const [teacherSignup, setTeacherSignup] = useState({ id:'', email:'', name:'', password:'', subjects:'', departments:'CSE' });

      const handleStudentSignup = () => {
        if (!studentSignup.id || !studentSignup.email || !studentSignup.name || !studentSignup.password) { alert('Fill all fields'); return; }
        if (findStudent(studentSignup.id) || findStudent(studentSignup.email)) { alert('ID or email already exists'); return; }
        const newS = { id:studentSignup.id, email:studentSignup.email, name:studentSignup.name, password:studentSignup.password, year:'BE', branch:studentSignup.branch, section:studentSignup.section };
        setStudents(prev => [...prev, newS]);
        alert('✅ Student account created. You can now log in.');
        setMode('studentLogin');
      };

      const handleTeacherSignup = () => {
        if (!teacherSignup.id || !teacherSignup.email || !teacherSignup.name || !teacherSignup.password) { alert('Fill all fields'); return; }
        if (findTeacher(teacherSignup.id) || findTeacher(teacherSignup.email)) { alert('ID or email already exists'); return; }
        const subjects = teacherSignup.subjects.split(',').map(s=>s.trim()).filter(Boolean);
        const departments = teacherSignup.departments.split(',').map(s=>s.trim().toUpperCase()).filter(Boolean);
        const newT = { id:teacherSignup.id, email:teacherSignup.email, name:teacherSignup.name, password:teacherSignup.password, subjects, departments };
        setTeachers(prev => [...prev, newT]);
        alert('✅ Teacher account created. You can now log in.');
        setMode('teacherLogin');
      };

      /* ---------- Helpers ---------- */
      const getTeacherById = (id) => teachers.find(t => t.id === id);
      const getStudentById = (id) => students.find(s => s.id === id);

      const getTeacherSubs = () => submissions.filter(sub => sub.teacherId === currentTeacher);
      const getStudentSubs = () => submissions.filter(sub => sub.studentIds.includes(currentStudent));

      const getStudentStats = () => {
        const map = {};
        submissions.forEach(sub => {
          if (sub.grade === null) return;
          const add = (name) => { if (!map[name]) map[name] = { total:0, count:0, maxTotal:0 }; map[name].total+=sub.grade; map[name].maxTotal+=sub.maxGrade; map[name].count+=1; };
          if (sub.type === 'individual') add(sub.name);
          else sub.teamMembers.forEach(id => { const st = getStudentById(id); if (st) add(st.name); });
        });
        return Object.keys(map).map(name => {
          const d = map[name];
          return { name, total:d.total, maxTotal:d.maxTotal, average:(d.total/d.maxTotal*100).toFixed(2), assignments:d.count };
        }).sort((a,b)=>parseFloat(b.average)-parseFloat(a.average)).map((s,i)=>({ ...s, rank:i+1 }));
      };

      const [form, setForm] = useState({ assignment:'', file:null, subject:'', teacherId:'', submissionType:'individual', teamMembers:'' });

      const handleSubmit = () => {
        if (!form.assignment || !form.file || !form.subject || !form.teacherId) { alert('Please fill all fields!'); return; }
        const t = getTeacherById(form.teacherId);
        if (!t) { alert('Invalid Teacher ID!'); return; }
        if (!t.subjects.includes(form.subject)) { alert('Teacher does not teach this subject!'); return; }

        let teamMembers = [currentStudent];
        if (form.submissionType === 'team') {
          if (!form.teamMembers.trim()) { alert('Enter team member IDs!'); return; }
          const members = form.teamMembers.split(',').map(x=>x.trim()).filter(Boolean);
          const invalid = members.filter(id => !getStudentById(id));
          if (invalid.length) { alert('Invalid IDs: ' + invalid.join(', ')); return; }
          teamMembers = Array.from(new Set([currentStudent, ...members]));
        }
        const names = teamMembers.map(id => getStudentById(id)?.name.split(' ')[0] || id);
        const compositeName = teamMembers.length > 1 ? ('Team: ' + names.join(' & ')) : getStudentById(currentStudent).name;

        const newSub = {
          id: submissions.length + 1,
          studentIds: teamMembers,
          name: compositeName,
          assignment: form.assignment,
          file: form.file.name,
          fileData: form.file,
          date: new Date().toISOString().split('T')[0],
          grade: null, maxGrade: 100,
          teacherId: form.teacherId,
          subject: form.subject,
          type: form.submissionType,
          teamMembers
        };
        setSubmissions(prev => [...prev, newSub]);
        setForm({ assignment:'', file:null, subject:'', teacherId:'', submissionType:'individual', teamMembers:'' });
        const fileInput = document.querySelector('input[type="file"]'); if (fileInput) fileInput.value='';
        alert('✅ Assignment submitted!');
      };

      const handleGradeUpdate = (id, value) => setSubmissions(prev => prev.map(s => s.id === id ? ({ ...s, grade: value==='' ? null : parseInt(value) }) : s));

      const exportToExcel = () => {
        const stats = getStudentStats();
        const wb = XLSX.utils.book_new();
        const rk = [['Rank','Name','Total','Max','Average','Assignments']];
        stats.forEach(s => rk.push([s.rank, s.name, s.total, s.maxTotal, s.average+'%', s.assignments]));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rk), 'Rankings');
        const subs = [['Student','Assignment','Subject','Type','Date','Grade','Max','Status']];
        submissions.forEach(s => subs.push([s.name, s.assignment, s.subject, s.type, s.date, s.grade ?? 'Pending', s.maxGrade, s.grade !== null ? 'Graded' : 'Pending']));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(subs), 'Submissions');
        XLSX.writeFile(wb, 'grades_' + new Date().toISOString().split('T')[0] + '.xlsx');
      };

      const handleViewFile = (s) => {
        if (s.fileData) {
          const url = URL.createObjectURL(s.fileData);
          const w = window.open(url, '_blank');
          if (!w) { const a = document.createElement('a'); a.href=url; a.download=s.file; a.click(); }
        } else alert('Sample row: no file attached.');
      };

      /* ---------- Header (Centered logo + title) ---------- */
      const Header = () => (
        <header className="max-w-7xl mx-auto p-6">
          <div className="flex items-center justify-center">{/* Simple SVG Logo */}
            <div className="w-16 h-16 rounded-2xl flex items-center justify-center logo-anim" style={{background:"linear-gradient(135deg, var(--primary), var(--pop))", color:"white"}}>
              <span className="text-2xl">🎓</span>
            </div>
          </div>
          <h1 className="text-center text-3xl md:text-4xl font-extrabold mt-3 tracking-tight">
            Assignment Hub
          </h1>
          <div className="flex items-center justify-end mt-4">
            {/* Bigger, more visible toggle on the right */}
            <Toggle theme={theme} setTheme={setTheme} />
          </div>
        </header>
      );

      // Highlight style for interactive buttons
      const popBtn = "btn px-6 py-4 rounded-xl text-white hover:scale-105 transition shadow-md text-base md:text-lg";
      const primaryBtn = { background:'var(--primary)' };
      const accentBtn  = { background:'var(--accent)'  };
      const popColor   = { background:'var(--pop)'     };
      const accent2Btn = { background:'var(--accent2)' };

      /* ---------- Splash Screen ---------- */
      const Splash = () => (
        <div className="fixed inset-0 splash-bg flex flex-col items-center justify-center z-50">
          <div className="w-24 h-24 rounded-3xl flex items-center justify-center logo-anim" style={{background:'linear-gradient(135deg, var(--primary), var(--pop))', color:'white'}}>
            <span className="text-4xl">🎓</span>
          </div>
          <div className="text-3xl md:text-5xl font-extrabold mt-4 animate-fadeSlideIn">Assignment Hub</div>
          <div className="mt-8 text-sm muted animate-fadeSlideIn">Loading...</div>
        </div>
      );

      return (
        <div>
          {mode === 'splash' && <Splash />}

          <div className={mode === 'splash' ? 'splash-hide pointer-events-none' : ''}>
            <Header />

            <main className="max-w-7xl mx-auto p-6 space-y-8">
              {mode === 'landing' && (
                <div className="grid grid-cols-1 md:grid-cols-3 gap-8 stagger">
                  <Section className="text-center">
                    <div className="flex items-center justify-center gap-3 mb-6">
                      <Icon name="user" className="w-7 h-7 text-[color:var(--pop)]" />
                      <h3 className="text-2xl font-semibold">Student Portal</h3>
                    </div>
                    <p className="text-sm muted mb-6">Submit assignments and track grades.</p>
                    <div className="flex flex-col sm:flex-row gap-3 justify-center">
                      <button onClick={() => setMode('studentLogin')} className={popBtn + ' animate-pop'} style={accentBtn}>
                        🔑 Login
                      </button>
                      <button onClick={() => setMode('studentSignup')} className={popBtn + ' animate-pop'} style={popColor}>
                        📝 Sign Up
                      </button>
                    </div>
                  </Section>

                  <Section className="text-center">
                    <div className="flex items-center justify-center gap-3 mb-6">
                      <Icon name="award" className="w-7 h-7 text-[color:var(--pop)]" />
                      <h3 className="text-2xl font-semibold">Teacher Portal</h3>
                    </div>
                    <p className="text-sm muted mb-6">Grade, export and manage submissions.</p>
                    <div className="flex flex-col sm:flex-row gap-3 justify-center">
                      <button onClick={() => setMode('teacherLogin')} className={popBtn + ' animate-pop'} style={primaryBtn}>
                        🔑 Login
                      </button>
                      <button onClick={() => setMode('teacherSignup')} className={popBtn + ' animate-pop'} style={accent2Btn}>
                        📝 Sign Up
                      </button>
                    </div>
                  </Section>

                  <Section className="text-center">
                    <div className="flex items-center justify-center gap-3 mb-6">
                      <Icon name="list" className="w-7 h-7 text-[color:var(--pop)]" />
                      <h3 className="text-2xl font-semibold">Public Grades</h3>
                    </div>
                    <p className="text-sm muted mb-6">View rankings and all submissions.</p>
                    <div className="flex justify-center">
                      <button onClick={() => setMode('viewGrades')} className={"btn px-6 py-4 rounded-xl border hover:scale-105 transition animate-pop text-base md:text-lg"}>
                        👀 View Grades
                      </button>
                    </div>
                  </Section>
                </div>
              )}

              {mode === 'viewGrades' && (
                <div className="space-y-6">
                  <div className="flex justify-between items-center animate-fadeSlideIn">
                    <h2 className="text-2xl font-semibold">Public Grades & Rankings</h2>
                    <div className="flex gap-2">
                      <button onClick={exportToExcel} className={popBtn} style={{background:'var(--success)'}}>
                        ⬇️ Export
                      </button>
                      <button onClick={() => setMode('landing')} className="btn px-4 py-3 rounded-xl border hover:scale-105 transition">Back</button>
                    </div>
                  </div>

                  <Section>
                    <h3 className="font-semibold mb-3">Rankings</h3>
                    <div className="overflow-x-auto">
                      <table className="w-full text-left">
                        <thead className="text-sm muted"><tr><th className="pb-2">Rank</th><th className="pb-2">Student</th><th className="pb-2">Total</th><th className="pb-2">Average</th></tr></thead>
                        <tbody className="stagger">
                          {getStudentStats().length === 0 ? (
                            <tr><td colSpan="4" className="py-6 text-center muted">No graded submissions yet.</td></tr>
                          ) : getStudentStats().map((s) => (
                            <tr key={s.name} className="border-t"><td className="py-2">{s.rank}</td><td className="py-2">{s.name}</td><td className="py-2">{s.total}/{s.maxTotal}</td><td className="py-2 font-semibold">{s.average}%</td></tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </Section>

                  <Section>
                    <h3 className="font-semibold mb-3">All Submissions</h3>
                    <div className="overflow-x-auto">
                      <table className="w-full text-left">
                        <thead className="text-sm muted"><tr><th className="pb-2">Student(s)</th><th className="pb-2">Assignment</th><th className="pb-2">Type</th><th className="pb-2">Grade</th></tr></thead>
                        <tbody className="stagger">
                          {submissions.map((s) => (
                            <tr key={s.id} className="border-t"><td className="py-2">{s.name}</td><td className="py-2">{s.assignment}</td><td className="py-2">{s.type === 'team' ? 'Team' : 'Individual'}</td><td className="py-2">{s.grade !== null ? `${s.grade}/${s.maxGrade}` : <span style={{color:'var(--warning)'}}>Pending</span>}</td></tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </Section>
                </div>
              )}

              {/* Logins & Signups */}
              {mode === 'teacherLogin' && (
                <div className="max-w-lg mx-auto animate-fadeSlideIn">
                  <Section>
                    <h3 className="text-2xl font-semibold mb-4">Teacher Login</h3>
                    <div className="space-y-3">
                      <input className="w-full p-4 rounded-lg border ring-focus" placeholder="College ID or Email" value={teacherLogin.idOrEmail} onChange={e => setTeacherLogin({...teacherLogin, idOrEmail:e.target.value})} />
                      <input className="w-full p-4 rounded-lg border ring-focus" placeholder="Password" type="password" value={teacherLogin.password} onChange={e => setTeacherLogin({...teacherLogin, password:e.target.value})} />
                      <div className="flex flex-wrap gap-3">
                        <button onClick={handleTeacherLogin} className={popBtn} style={primaryBtn}>🔑 Login</button>
                        <button onClick={() => setMode('teacherSignup')} className={popBtn} style={accent2Btn}>📝 Sign Up</button>
                        <button onClick={() => setMode('landing')} className="flex-1 p-4 rounded-lg border btn">Back</button>
                      </div>
                    </div>
                  </Section>
                </div>
              )}

              {mode === 'studentLogin' && (
                <div className="max-w-lg mx-auto animate-fadeSlideIn">
                  <Section>
                    <h3 className="text-2xl font-semibold mb-4">Student Login</h3>
                    <div className="space-y-3">
                      <input className="w-full p-4 rounded-lg border ring-focus" placeholder="College ID or Email" value={studentLogin.idOrEmail} onChange={e => setStudentLogin({...studentLogin, idOrEmail:e.target.value})} />
                      <input className="w-full p-4 rounded-lg border ring-focus" placeholder="Password" type="password" value={studentLogin.password} onChange={e => setStudentLogin({...studentLogin, password:e.target.value})} />
                      <div className="flex flex-wrap gap-3">
                        <button onClick={handleStudentLogin} className={popBtn} style={accentBtn}>🔑 Login</button>
                        <button onClick={() => setMode('studentSignup')} className={popBtn} style={popColor}>📝 Sign Up</button>
                        <button onClick={() => setMode('landing')} className="flex-1 p-4 rounded-lg border btn">Back</button>
                      </div>
                    </div>
                  </Section>
                </div>
              )}

              {mode === 'studentSignup' && (
                <div className="max-w-xl mx-auto animate-fadeSlideIn">
                  <Section>
                    <h3 className="text-2xl font-semibold mb-4">Student Sign Up</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <input className="p-4 rounded-lg border ring-focus" placeholder="College ID (e.g. BE-CSE-010)" value={studentSignup.id} onChange={e => setStudentSignup({...studentSignup, id:e.target.value})} />
                      <input className="p-4 rounded-lg border ring-focus" placeholder="Email" value={studentSignup.email} onChange={e => setStudentSignup({...studentSignup, email:e.target.value})} />
                      <input className="p-4 rounded-lg border ring-focus md:col-span-2" placeholder="Full Name" value={studentSignup.name} onChange={e => setStudentSignup({...studentSignup, name:e.target.value})} />
                      <select className="p-4 rounded-lg border ring-focus" value={studentSignup.branch} onChange={e => setStudentSignup({...studentSignup, branch:e.target.value})}>
                        <option>CSE</option><option>ECE</option><option>EEE</option><option>MECH</option><option>CIVIL</option>
                      </select>
                      <input className="p-4 rounded-lg border ring-focus" placeholder="Section (e.g. A)" value={studentSignup.section} onChange={e => setStudentSignup({...studentSignup, section:e.target.value})} />
                      <input className="p-4 rounded-lg border ring-focus md:col-span-2" placeholder="Password" type="password" value={studentSignup.password} onChange={e => setStudentSignup({...studentSignup, password:e.target.value})} />
                    </div>
                    <div className="mt-5 flex gap-3">
                      <button onClick={handleStudentSignup} className={popBtn} style={popColor}>📝 Create Account</button>
                      <button onClick={() => setMode('studentLogin')} className="px-6 py-4 rounded-lg border btn">Back to Login</button>
                    </div>
                  </Section>
                </div>
              )}

              {mode === 'teacherSignup' && (
                <div className="max-w-xl mx-auto animate-fadeSlideIn">
                  <Section>
                    <h3 className="text-2xl font-semibold mb-4">Teacher Sign Up</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <input className="p-4 rounded-lg border ring-focus" placeholder="College ID (e.g. BE-T010)" value={teacherSignup.id} onChange={e => setTeacherSignup({...teacherSignup, id:e.target.value})} />
                      <input className="p-4 rounded-lg border ring-focus" placeholder="Email" value={teacherSignup.email} onChange={e => setTeacherSignup({...teacherSignup, email:e.target.value})} />
                      <input className="p-4 rounded-lg border ring-focus md:col-span-2" placeholder="Full Name" value={teacherSignup.name} onChange={e => setTeacherSignup({...teacherSignup, name:e.target.value})} />
                      <input className="p-4 rounded-lg border ring-focus md:col-span-2" placeholder="Subjects (comma separated)" value={teacherSignup.subjects} onChange={e => setTeacherSignup({...teacherSignup, subjects:e.target.value})} />
                      <input className="p-4 rounded-lg border ring-focus md:col-span-2" placeholder="Departments (comma separated, e.g. CSE,ECE)" value={teacherSignup.departments} onChange={e => setTeacherSignup({...teacherSignup, departments:e.target.value})} />
                      <input className="p-4 rounded-lg border ring-focus md:col-span-2" placeholder="Password" type="password" value={teacherSignup.password} onChange={e => setTeacherSignup({...teacherSignup, password:e.target.value})} />
                    </div>
                    <div className="mt-5 flex gap-3">
                      <button onClick={handleTeacherSignup} className={popBtn} style={accent2Btn}>📝 Create Account</button>
                      <button onClick={() => setMode('teacherLogin')} className="px-6 py-4 rounded-lg border btn">Back to Login</button>
                    </div>
                  </Section>
                </div>
              )}

              {/* Student & Teacher dashboards remain the same as previous build */}
              {mode === 'student' && currentStudent && (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                  <Section>
                    <div className="flex justify-between items-start mb-5">
                      <div>
                        <h3 className="text-2xl font-semibold">Welcome, {getStudentById(currentStudent)?.name}</h3>
                        <p className="text-sm muted">Branch {getStudentById(currentStudent)?.branch} • Year BE</p>
                      </div>
                      <button onClick={handleLogout} className="btn px-4 py-3 rounded-xl border flex items-center gap-2 hover:scale-105 transition">🚪 Logout</button>
                    </div>

                    <div className="space-y-4">
                      <div>
                        <label className="text-sm muted block mb-1">Type</label>
                        <select className="w-full p-4 rounded-lg border" value={form.submissionType} onChange={e => setForm({...form, submissionType:e.target.value})}>
                          <option value="individual">Individual</option>
                          <option value="team">Team</option>
                        </select>
                      </div>

                      {form.submissionType === 'team' && (
                        <div>
                          <label className="text-sm muted block mb-1">Team Members (IDs)</label>
                          <input className="w-full p-4 rounded-lg border" placeholder="BE-CSE-010,BE-ECE-002" value={form.teamMembers} onChange={e => setForm({...form, teamMembers:e.target.value})} />
                        </div>
                      )}

                      <div>
                        <label className="text-sm muted block mb-1">Subject</label>
                        <select className="w-full p-4 rounded-lg border" value={form.subject} onChange={e => setForm({...form, subject:e.target.value})}>
                          <option value="">Select</option>
                          {Array.from(new Set(teachers.flatMap(t => t.subjects))).map(s => <option key={s}>{s}</option>)}
                        </select>
                      </div>

                      <input className="w-full p-4 rounded-lg border" placeholder="Teacher ID (e.g. BE-T001)" value={form.teacherId} onChange={e => setForm({...form, teacherId:e.target.value})} />
                      <input className="w-full p-4 rounded-lg border" placeholder="Assignment title" value={form.assignment} onChange={e => setForm({...form, assignment:e.target.value})} />
                      <input type="file" className="w-full" onChange={e => setForm({...form, file:e.target.files[0]})} />

                      <button onClick={handleSubmit} className={popBtn + ' animate-pop'} style={accentBtn}>
                        📤 Submit Assignment
                      </button>
                    </div>
                  </Section>

                  <Section>
                    <h3 className="text-xl font-semibold mb-4">My Submissions</h3>
                    <div className="space-y-3 max-h-[520px] overflow-y-auto stagger">
                      {getStudentSubs().length === 0 ? (
                        <div className="muted">No submissions yet.</div>
                      ) : getStudentSubs().map((s) => (
                        <div key={s.id} className="p-4 rounded-lg border flex justify-between items-center animate-fadeSlideIn">
                          <div>
                            <div className="font-medium">{s.assignment}</div>
                            <div className="text-sm muted">{s.subject} • {s.date}</div>
                            {s.type === 'team' && <div className="text-xs muted mt-1">👥 Team</div>}
                          </div>
                          <div className="text-right">
                            {s.grade !== null ? <div className="text-green-600 font-semibold">{s.grade}/{s.maxGrade}</div> : <div style={{color:'var(--warning)'}}>Pending</div>}
                          </div>
                        </div>
                      ))}
                    </div>
                  </Section>
                </div>
              )}

              {mode === 'teacher' && currentTeacher && (
                <div className="space-y-8">
                  <Section>
                    <div className="flex justify-between items-center">
                      <div>
                        <h3 className="text-2xl font-semibold">Hello, {getTeacherById(currentTeacher)?.name}</h3>
                        <p className="text-sm muted">Subjects: {getTeacherById(currentTeacher)?.subjects.join(', ')}</p>
                      </div>
                      <div className="flex gap-2">
                        <button onClick={exportToExcel} className={popBtn} style={{background:'var(--success)'}}>⬇️ Export</button>
                        <button onClick={() => setMode('landing')} className="px-6 py-4 rounded-xl border btn hover:scale-105 transition">🏠 Home</button>
                        <button onClick={handleLogout} className="px-6 py-4 rounded-xl border btn hover:scale-105 transition">🚪 Logout</button>
                      </div>
                    </div>
                  </Section>

                  <Section>
                    <h3 className="font-semibold mb-4">Grade Submissions</h3>
                    {getTeacherSubs().length === 0 ? (
                      <div className="muted">No submissions for your subjects yet.</div>
                    ) : (
                      <div className="overflow-x-auto">
                        <table className="w-full text-left">
                          <thead className="text-sm muted"><tr><th className="pb-2">Student(s)</th><th className="pb-2">Assignment</th><th className="pb-2">Subject</th><th className="pb-2">Type</th><th className="pb-2">Date</th><th className="pb-2">File</th><th className="pb-2">Grade</th><th className="pb-2">Max</th></tr></thead>
                          <tbody className="stagger">
                            {getTeacherSubs().map((s) => (
                              <tr key={s.id} className="border-t">
                                <td className="py-2">{s.name}</td>
                                <td className="py-2">{s.assignment}</td>
                                <td className="py-2">{s.subject}</td>
                                <td className="py-2">{s.type === 'team' ? 'Team' : 'Individual'}</td>
                                <td className="py-2">{s.date}</td>
                                <td className="py-2">
                                  <button onClick={() => handleViewFile(s)} className="px-3 py-2 rounded-md border btn hover:scale-105 transition">📄 View</button>
                                </td>
                                <td className="py-2">
                                  <input type="number" min="0" max={s.maxGrade} value={s.grade ?? ''} onChange={e => handleGradeUpdate(s.id, e.target.value)} className="w-24 p-3 border rounded-md ring-focus" />
                                </td>
                                <td className="py-2">{s.maxGrade}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </Section>
                </div>
              )}
            </main>

            <footer className="max-w-7xl mx-auto p-6"></footer>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    window.addEventListener('load', () => { if (window.lucide && window.lucide.createIcons) window.lucide.createIcons(); });
  </script>
</body>
</html>
